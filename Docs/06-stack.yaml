stack:
  app:
    services:
      - name: fastapi
      - name: react-ui
      - name: superset
      - name: nginx

  workflow:
    services:
      - name: n8n
      - name: camunda

  agent:
    services:
      - name: langgraph
        models:
          - name: llama-3.3-70b-instruct
            port: 8000
            precision: fp8
            tensor_parallelism: 2
          - name: llama-3.1-8b-instruct
            port: 8002
      - name: mcp-server
      - name: mlflow
      - name: triton-fil
        models:
          - name: xgboost
            port: 8010

  docs:
    services:
      - name: apache-tika
      - name: nemotron-ocr-v1
        port: 8021
      - name: nemotron-parse
        port: 8022
      - name: gliner-pii
        port: 8020
      - name: opensanctions

  graph_vector:
    services:
      - name: neo4j
      - name: milvus
        models:
          - name: nv-embedqa-e5-v5
            port: 8001
      - name: reranker
        models:
          - name: llama-nemotron-rerank-1b-v2
            port: 8003

  storage:
    services:
      - name: postgresql
      - name: clickhouse
      - name: redis

  hardware:
    gpu_server:
      gpus: 2
      model: nvidia-l40s
      vram_per_gpu_gb: 48