# =============================================================================
# goAML-V2 — App Server Compose
# Server  : app server (no GPU required)
# Base    : /home/ze/goaml-v2
# Network : goamlv2-net
# Talks to: GPU server NIM endpoints via GPU_SERVER_HOST (set in .env)
# Layers  : Storage · Graph+Vector · Docs · Agent · Workflow · App
# =============================================================================

name: goaml-v2-app

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"

services:

  # ──────────────────────────────────────────────────────────────────────────
  # STORAGE LAYER
  # ──────────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: goaml_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-goaml}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: goaml
    volumes:
      - /home/ze/goaml-v2/postgres/data:/var/lib/postgresql/data
      - /home/ze/goaml-v2/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goaml}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [goamlv2-net]
    <<: [*restart, *logging]

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: goaml_clickhouse
    environment:
      CLICKHOUSE_DB: goaml
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-goaml}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD required}
    volumes:
      - /home/ze/goaml-v2/clickhouse/data:/var/lib/clickhouse
      - /home/ze/goaml-v2/clickhouse/logs:/var/log/clickhouse-server
      - /home/ze/goaml-v2/clickhouse/config:/etc/clickhouse-server/config.d
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # native TCP
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [goamlv2-net]
    <<: [*restart, *logging]

  redis:
    image: redis:7.2-alpine
    container_name: goaml_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --save 60 1
    volumes:
      - /home/ze/goaml-v2/redis/data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [goamlv2-net]
    <<: [*restart, *logging]

  # ──────────────────────────────────────────────────────────────────────────
  # GRAPH + VECTOR LAYER
  # ──────────────────────────────────────────────────────────────────────────

  neo4j:
    image: neo4j:5.19-enterprise
    container_name: goaml_neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD required}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_server_memory_heap_initial__size: 4g
      NEO4J_server_memory_heap_max__size: 8g
      NEO4J_server_memory_pagecache_size: 4g
      NEO4J_PLUGINS: '["apoc","graph-data-science"]'
    volumes:
      - /home/ze/goaml-v2/neo4j/data:/data
      - /home/ze/goaml-v2/neo4j/logs:/logs
      - /home/ze/goaml-v2/neo4j/import:/import
      - /home/ze/goaml-v2/neo4j/plugins:/plugins
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks: [goamlv2-net]
    <<: [*restart, *logging]

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.14
    container_name: goaml_milvus_etcd
    command: >
      etcd
      --advertise-client-urls=http://milvus-etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
      --auto-compaction-mode=revision
      --auto-compaction-retention=1000
      --quota-backend-bytes=4294967296
    volumes:
      - /home/ze/goaml-v2/milvus/etcd:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks: [goamlv2-net]
    <<: [*restart, *logging]

  milvus-minio:
    image: minio/minio:RELEASE.2024-05-01T01-11-10Z
    container_name: goaml_milvus_minio
    command: minio server /minio_data --console-address ":9001"
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY required}
    volumes:
      - /home/ze/goaml-v2/milvus/minio:/minio_data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks: [goamlv2-net]
    <<: [*restart, *logging]

  milvus:
    image: milvusdb/milvus:v2.4.9
    container_name: goaml_milvus
    command: milvus run standalone
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
    volumes:
      - /home/ze/goaml-v2/milvus/data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      milvus-etcd: { condition: service_healthy }
      milvus-minio: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks: [goamlv2-net]
    <<: [*restart, *logging]

  # ──────────────────────────────────────────────────────────────────────────
  # DOCUMENT LAYER
  # ──────────────────────────────────────────────────────────────────────────

  tika:
    image: apache/tika:2.9.2
    container_name: goaml_tika
    ports:
      - "9998:9998"
    networks: [goamlv2-net]
    <<: [*restart, *logging]

  opensanctions:
    image: ghcr.io/opensanctions/opensanctions:latest
    container_name: goaml_opensanctions
    environment:
      OPENSANCTIONS_DATABASE_URI: postgresql://${POSTGRES_USER:-goaml}:${POSTGRES_PASSWORD}@postgres:5432/opensanctions
    volumes:
      - /home/ze/goaml-v2/opensanctions/data:/var/lib/opensanctions
    ports:
      - "8095:8000"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [goamlv2-net]
    <<: [*restart, *logging]

  # ──────────────────────────────────────────────────────────────────────────
  # AGENT LAYER
  # ──────────────────────────────────────────────────────────────────────────

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: goaml_mlflow
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-goaml}:${POSTGRES_PASSWORD}@postgres:5432/mlflow
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    volumes:
      - /home/ze/goaml-v2/mlflow/artifacts:/mlflow/artifacts
    ports:
      - "5000:5000"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [goamlv2-net]
    <<: [*restart, *logging]

  # ──────────────────────────────────────────────────────────────────────────
  # WORKFLOW LAYER
  # ──────────────────────────────────────────────────────────────────────────

  n8n:
    image: n8nio/n8n:1.44.1
    container_name: goaml_n8n
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-goaml}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY required}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      GENERIC_TIMEZONE: Asia/Dhaka
    volumes:
      - /home/ze/goaml-v2/n8n/data:/home/node/.n8n
    ports:
      - "5678:5678"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [goamlv2-net]
    <<: [*restart, *logging]

  camunda:
    image: camunda/camunda-bpm-platform:7.21.0
    container_name: goaml_camunda
    environment:
      DB_DRIVER: org.postgresql.Driver
      DB_URL: jdbc:postgresql://postgres:5432/camunda
      DB_USERNAME: ${POSTGRES_USER:-goaml}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      WAIT_FOR: postgres:5432
    volumes:
      - /home/ze/goaml-v2/camunda/config:/camunda/conf
      - /home/ze/goaml-v2/camunda/deployments:/camunda/webapps/camunda/WEB-INF/lib
    ports:
      - "8080:8080"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [goamlv2-net]
    <<: [*restart, *logging]

  # ──────────────────────────────────────────────────────────────────────────
  # APP LAYER
  # NIM endpoints resolved via GPU_SERVER_HOST (set in .env)
  # ──────────────────────────────────────────────────────────────────────────

  superset:
    image: apache/superset:4.1.1
    container_name: goaml_superset
    command: ["/bin/sh", "-c", "/app/docker/docker-bootstrap.sh app-gunicorn"]
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-goaml}:${POSTGRES_PASSWORD}@postgres:5432/superset
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      SECRET_KEY: ${SUPERSET_SECRET_KEY:?SUPERSET_SECRET_KEY required}
      SUPERSET_ENV: production
    volumes:
      - /home/ze/goaml-v2/superset/config:/app/pythonpath
      - /home/ze/goaml-v2/superset/data:/app/superset_home
    ports:
      - "8088:8088"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [goamlv2-net]
    <<: [*restart, *logging]

  superset-worker:
    image: apache/superset:4.1.1
    container_name: goaml_superset_worker
    command: ["/bin/sh", "-c", "/app/docker/docker-bootstrap.sh worker"]
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-goaml}:${POSTGRES_PASSWORD}@postgres:5432/superset
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      SECRET_KEY: ${SUPERSET_SECRET_KEY}
    volumes:
      - /home/ze/goaml-v2/superset/config:/app/pythonpath
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [goamlv2-net]
    <<: [*restart, *logging]

  fastapi:
    image: tiangolo/uvicorn-gunicorn-fastapi:python3.11
    container_name: goaml_fastapi
    environment:
      MODULE_NAME: main
      VARIABLE_NAME: app
      PORT: "8500"
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-goaml}:${POSTGRES_PASSWORD}@postgres:5432/goaml
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      # ── NIM endpoints on GPU server ──
      NIM_70B_URL: http://${GPU_SERVER_HOST:?GPU_SERVER_HOST required}:8000
      NIM_8B_URL: http://${GPU_SERVER_HOST}:8002
      NIM_EMBED_URL: http://${GPU_SERVER_HOST}:8001
      NIM_RERANK_URL: http://${GPU_SERVER_HOST}:8003
      NIM_OCR_URL: http://${GPU_SERVER_HOST}:8021
      NIM_PARSE_URL: http://${GPU_SERVER_HOST}:8022
      NIM_PII_URL: http://${GPU_SERVER_HOST}:8020
      TRITON_URL: http://${GPU_SERVER_HOST}:8010
      # ── Local services ──
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    volumes:
      - /home/ze/goaml-v2/fastapi/app:/app
    ports:
      - "8500:8500"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [goamlv2-net]
    <<: [*restart, *logging]

  nginx:
    image: nginx:1.27-alpine
    container_name: goaml_nginx
    volumes:
      - /home/ze/goaml-v2/nginx/conf:/etc/nginx/conf.d
      - /home/ze/goaml-v2/nginx/ssl:/etc/nginx/ssl
      - /home/ze/goaml-v2/nginx/logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - fastapi
      - superset
    networks: [goamlv2-net]
    <<: [*restart, *logging]

# =============================================================================
# NETWORK
# =============================================================================
networks:
  goamlv2-net:
    name: goamlv2-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
