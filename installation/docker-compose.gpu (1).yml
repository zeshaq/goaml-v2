# =============================================================================
# goAML-V2 — GPU Inference Server Compose
# Server  : GPU server (2× NVIDIA L40S 48 GB)
# Base    : /home/ze/goaml-v2
# Network : goamlv2-net
# =============================================================================
# GPU allocation:
#   GPU 0+1 — nim-nemotron-49b (TP=2, claims both)
#   GPU 1   — nim-llama-8b, nim-embedqa, nim-rerank
#   GPU 0   — nim-ocr, nim-parse, triton-fil
#   CPU     — nim-pii
#
# Primary model: llama-3.3-nemotron-super-49b-v1.5
#   - NAS-optimised derivative of Llama-3.3-70B, ~49B effective params
#   - Reasoning ON by default; set /no_think in system prompt for fast mode
#   - Fits comfortably on 2× L40S (96 GB) at TP=2
#   - Recommended: temp=0.6, top_p=0.95 (reasoning ON)
#                  greedy decoding (reasoning OFF / /no_think)
# =============================================================================

name: goaml-v2-gpu

services:

  # ── llama-3.3-nemotron-super-49b-v1.5 ──────────────────────────────────────
  # Primary reasoning — SAR drafting, investigation chains, RAG, tool calling
  # Both GPUs · TP=2 · port 8000
  # Start this first — claims both GPUs before sidecar models load
  # ──────────────────────────────────────────────────────────────────────────
  nim-nemotron-49b:
    image: nvcr.io/nim/nvidia/llama-3.3-nemotron-super-49b-v1.5:latest
    container_name: goaml_nim_nemotron_49b
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      NIM_TENSOR_PARALLEL_SIZE: "2"
      NIM_MAX_MODEL_LEN: "32768"
      NIM_MAX_NUM_SEQS: "64"
      NIM_GPU_MEMORY_UTILIZATION: "0.90"
    volumes:
      - /home/ze/goaml-v2/nim-cache:/opt/nim/.cache
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health/ready"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 180s
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "5" }
    networks: [goamlv2-net]

  # ── llama-3.1-8b-instruct ──────────────────────────────────────────────────
  # Fast aux — intent routing, quick classification, low-latency paths
  # GPU 1 · port 8002
  # ──────────────────────────────────────────────────────────────────────────
  nim-llama-8b:
    image: nvcr.io/nim/meta/llama-3.1-8b-instruct:latest
    container_name: goaml_nim_llama_8b
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: "1"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - /home/ze/goaml-v2/nim-cache:/opt/nim/.cache
    ports:
      - "8002:8000"
    depends_on:
      nim-nemotron-49b: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health/ready"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "5" }
    networks: [goamlv2-net]

  # ── nv-embedqa-e5-v5 ───────────────────────────────────────────────────────
  # Vector embeddings for Milvus semantic search
  # GPU 1 · port 8001
  # ──────────────────────────────────────────────────────────────────────────
  nim-embedqa:
    image: nvcr.io/nim/nvidia/nv-embedqa-e5-v5:latest
    container_name: goaml_nim_embedqa
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: "1"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - /home/ze/goaml-v2/nim-cache:/opt/nim/.cache
    ports:
      - "8001:8000"
    depends_on:
      nim-nemotron-49b: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health/ready"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 90s
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "5" }
    networks: [goamlv2-net]

  # ── llama-nemotron-rerank-1b-v2 ────────────────────────────────────────────
  # Re-ranks Milvus retrieval results before LLM context injection
  # GPU 1 · port 8003
  # ──────────────────────────────────────────────────────────────────────────
  nim-rerank:
    image: nvcr.io/nim/nvidia/llama-nemotron-rerank-1b-v2:latest
    container_name: goaml_nim_rerank
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: "1"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - /home/ze/goaml-v2/nim-cache:/opt/nim/.cache
    ports:
      - "8003:8000"
    depends_on:
      nim-nemotron-49b: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health/ready"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 90s
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "5" }
    networks: [goamlv2-net]

  # ── nemotron-ocr-v1 ────────────────────────────────────────────────────────
  # Scanned KYC docs and bank statement OCR
  # GPU 0 · port 8021
  # ──────────────────────────────────────────────────────────────────────────
  nim-ocr:
    image: nvcr.io/nim/nvidia/nemotron-ocr-v1:latest
    container_name: goaml_nim_ocr
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: "0"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - /home/ze/goaml-v2/nim-cache:/opt/nim/.cache
    ports:
      - "8021:8000"
    depends_on:
      nim-nemotron-49b: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health/ready"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 90s
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "5" }
    networks: [goamlv2-net]

  # ── nemotron-parse ─────────────────────────────────────────────────────────
  # Structured field extraction from OCR text
  # GPU 0 · port 8022
  # ──────────────────────────────────────────────────────────────────────────
  nim-parse:
    image: nvcr.io/nim/nvidia/nemotron-parse:latest
    container_name: goaml_nim_parse
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: "0"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - /home/ze/goaml-v2/nim-cache:/opt/nim/.cache
    ports:
      - "8022:8000"
    depends_on:
      nim-nemotron-49b: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health/ready"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 90s
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "5" }
    networks: [goamlv2-net]

  # ── gliner-pii ─────────────────────────────────────────────────────────────
  # PII detection and redaction — CPU only, no GPU needed
  # port 8020
  # ──────────────────────────────────────────────────────────────────────────
  nim-pii:
    image: nvcr.io/nim/nvidia/gliner-pii:latest
    container_name: goaml_nim_pii
    volumes:
      - /home/ze/goaml-v2/nim-cache:/opt/nim/.cache
    ports:
      - "8020:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health/ready"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "5" }
    networks: [goamlv2-net]

  # ── XGBoost · Triton FIL ───────────────────────────────────────────────────
  # Tabular AML/fraud risk scoring — deterministic, high-throughput
  # GPU 0 · HTTP :8010 · gRPC :8011 · metrics :8012
  # Model repo expected at: /home/ze/goaml-v2/triton/models
  # ──────────────────────────────────────────────────────────────────────────
  triton-fil:
    image: nvcr.io/nvidia/tritonserver:24.04-py3
    container_name: goaml_triton_fil
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: "0"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    command: >
      tritonserver
      --model-repository=/models
      --backend-config=fil,use_experimental_optimistic_host_transfer=true
      --http-port=8000
      --grpc-port=8001
      --metrics-port=8002
      --log-verbose=0
    volumes:
      - /home/ze/goaml-v2/triton/models:/models
      - /home/ze/goaml-v2/triton/logs:/logs
    ports:
      - "8010:8000"
      - "8011:8001"
      - "8012:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "5" }
    networks: [goamlv2-net]

# =============================================================================
# NETWORK
# =============================================================================
networks:
  goamlv2-net:
    name: goamlv2-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/16
