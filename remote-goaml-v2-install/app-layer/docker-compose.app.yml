services:

  # ─────────────────────────────────────────
  # FastAPI — goAML-V2 backend API
  # ─────────────────────────────────────────
  fastapi:
    image: goaml-fastapi:latest
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: goaml-fastapi
    restart: unless-stopped
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-goaml}:${POSTGRES_PASSWORD}@goaml-postgres:5432/${POSTGRES_DB:-goaml}
      CLICKHOUSE_URL: http://goaml-clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-goaml}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD_RAW}
      REDIS_URL: redis://:${REDIS_PASSWORD}@goaml-redis:6379/0
      NEO4J_URI: bolt://goaml-neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD_RAW}
      MILVUS_HOST: goaml-milvus
      MILVUS_PORT: 19530
      MINIO_ENDPOINT: http://goaml-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-Asdf@1234}
      MINIO_BUCKET: ${MINIO_BUCKET:-goaml-documents}
      # Remote model APIs on gpu-01 (160.30.63.152)
      LLM_PRIMARY_URL: http://160.30.63.152:8000/v1
      LLM_FAST_URL: http://160.30.63.152:8002/v1
      EMBED_URL: http://160.30.63.152:8001/v1
      RERANK_URL: http://160.30.63.152:8003/v1
      PARSE_URL: http://160.30.63.152:8022/v1
      OCR_URL: http://160.30.63.152:8021
      PII_URL: http://160.30.63.152:8020
      YENTE_URL: http://goaml-yente:8000
      TIKA_URL: http://goaml-tika:9998
      MLFLOW_TRACKING_URI: http://goaml-mlflow:5000
      SCORER_URL: http://160.30.63.152:8010
      # Compatibility aliases for older code paths
      LLM_BASE_URL: http://160.30.63.152:8000/v1
      LLM_FAST_BASE_URL: http://160.30.63.152:8002/v1
      EMBED_BASE_URL: http://160.30.63.152:8001/v1
      RERANK_BASE_URL: http://160.30.63.152:8003/v1
      TRITON_URL: http://160.30.63.152:8010
    volumes:
      - ./app:/app
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - goaml-network

  # ─────────────────────────────────────────
  # React UI — goAML-V2 frontend
  # ─────────────────────────────────────────
  react-ui:
    image: goaml-react-ui:latest
    build:
      context: ./ui
      dockerfile: Dockerfile.ui
    container_name: goaml-react-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - goaml-network

  # ─────────────────────────────────────────
  # Apache Superset — Analytics & dashboards
  # ─────────────────────────────────────────
  superset:
    image: goaml-superset:latest
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: goaml-superset
    restart: unless-stopped
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-goaml}:${POSTGRES_PASSWORD}@goaml-postgres:5432/superset
      REDIS_URL: redis://:${REDIS_PASSWORD}@goaml-redis:6379/3
    volumes:
      - superset_data:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py
    ports:
      - "8088:8088"
    command: >
      sh -c "
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname Admin --email admin@goaml.local --password ${SUPERSET_ADMIN_PASSWORD} &&
        superset init &&
        superset run -p 8088 --with-threads --reload --debugger
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - goaml-network

  # ─────────────────────────────────────────
  # Nginx — Reverse proxy & static serving
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: goaml-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      fastapi:
        condition: service_healthy
      superset:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - goaml-network

volumes:
  superset_data:

networks:
  goaml-network:
    external: true
