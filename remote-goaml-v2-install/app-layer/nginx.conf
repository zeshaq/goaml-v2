events {
    worker_connections 1024;
}

http {
    upstream fastapi {
        server goaml-fastapi:8000;
    }

    upstream react_ui {
        server goaml-react-ui:80;
    }

    upstream superset {
        server goaml-superset:8088;
    }

    upstream mlflow {
        server goaml-mlflow:5000;
    }

    upstream n8n {
        server goaml-n8n:5678;
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 100M;

        # Health check
        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # React UI — default
        location / {
            proxy_pass http://react_ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # FastAPI backend
        location /api/ {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # FastAPI docs
        location /docs {
            proxy_pass http://fastapi/docs;
            proxy_set_header Host $host;
        }

        # Superset analytics
        location /superset/ {
            proxy_pass http://superset/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MLflow model registry
        location /mlflow/ {
            proxy_pass http://mlflow/;
            proxy_set_header Host $host;
        }

        # n8n workflows
        location /n8n/ {
            proxy_pass http://n8n/;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
