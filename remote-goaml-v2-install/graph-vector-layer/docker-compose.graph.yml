services:

  # ─────────────────────────────────────────
  # Neo4j — Graph Database
  # ─────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: goaml-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*,gds.*
      NEO4J_server_memory_heap_initial__size: 2g
      NEO4J_server_memory_heap_max__size: 8g
      NEO4J_server_memory_pagecache_size: 4g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - goaml-network

  # ─────────────────────────────────────────
  # etcd — Milvus metadata store
  # ─────────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    container_name: goaml-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"   # 4GB
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - goaml-network

  # ─────────────────────────────────────────
  # MinIO — Milvus object storage
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: goaml-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - minio_data:/minio_data
    ports:
      - "9002:9000"   # S3 API (offset to avoid clash with ClickHouse native port)
      - "9001:9001"   # MinIO console
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - goaml-network

  # ─────────────────────────────────────────
  # Milvus Standalone — Vector Database
  # ─────────────────────────────────────────
  milvus:
    image: milvusdb/milvus:v2.4.9
    container_name: goaml-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"   # gRPC
      - "9091:9091"     # HTTP / metrics
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - goaml-network

  # ─────────────────────────────────────────
  # Attu — Milvus Web UI
  # ─────────────────────────────────────────
  attu:
    image: zilliz/attu:v2.4
    container_name: goaml-attu
    restart: unless-stopped
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "8080:3000"
    depends_on:
      milvus:
        condition: service_healthy
    networks:
      - goaml-network

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  etcd_data:
  minio_data:
  milvus_data:

networks:
  goaml-network:
    external: true
