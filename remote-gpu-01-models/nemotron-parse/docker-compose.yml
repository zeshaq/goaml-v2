services:
  nemotron-parse:
    build: .
    container_name: goaml-parse
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=1
      - HF_HOME=/root/.cache/huggingface
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
    ports:
      - "8022:8022"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ipc: host
    command: >
      --model nvidia/NVIDIA-Nemotron-Parse-v1.1
      --host 0.0.0.0
      --port 8022
      --trust-remote-code
      --dtype bfloat16
      --max-model-len 8000
      --gpu-memory-utilization 0.20
      --limit-mm-per-prompt '{"image": 1}'
      --served-model-name nemotron-parse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8022/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
