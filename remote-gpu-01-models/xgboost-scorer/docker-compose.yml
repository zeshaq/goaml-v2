services:
  xgboost-scorer:
    build: .
    container_name: goaml-scorer
    restart: unless-stopped
    ports:
      - "8010:8010"
    volumes:
      - ./models:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
